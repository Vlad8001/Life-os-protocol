<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life OS Protocol</title>
  <meta name="description" content="Personal operating system — tasks, habits, finance, job hunt" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80' x='10'>⚡</text></svg>" />

  <!-- ─────────────────────────────────────────────────────────────────
       Dependencies (all from CDN — no install / build step needed)
       ───────────────────────────────────────────────────────────────── -->

  <!-- Tailwind CSS (Play CDN, JIT in-browser) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ES Module map — resolves `import 'react'` etc. to CDN URLs -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react": "https://esm.sh/lucide-react@0.378.0?deps=react@18.3.1"
    }
  }
  </script>

  <!-- Babel standalone — transpiles the .jsx file at runtime -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    html, body { margin: 0; padding: 0; background: #fafafa; min-height: 100vh; }

    /* Boot screen — visible until React mounts */
    #root:empty {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 12px;
    }
    #root:empty::before {
      content: "BOOTING LIFE_OS.PROTOCOL";
      font-family: ui-monospace, "SF Mono", Monaco, Menlo, monospace;
      font-size: 11px;
      color: #10b981;
      letter-spacing: 0.35em;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #root:empty::after {
      content: "fetching dependencies · transpiling";
      font-family: ui-monospace, "SF Mono", Monaco, Menlo, monospace;
      font-size: 9px;
      color: #a1a1aa;
      letter-spacing: 0.25em;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* Fail-safe error display */
    .__boot_error {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      padding: 24px;
      flex-direction: column;
      gap: 12px;
      font-family: ui-monospace, "SF Mono", Monaco, Menlo, monospace;
      text-align: center;
    }
    .__boot_error h1 {
      font-size: 13px;
      color: #dc2626;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin: 0;
    }
    .__boot_error pre {
      font-size: 11px;
      color: #18181b;
      background: white;
      border: 1px solid #e4e4e7;
      padding: 12px 16px;
      max-width: 600px;
      overflow: auto;
      text-align: left;
    }
    .__boot_error a { color: #10b981; font-size: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    App entry — Babel standalone fetches life-os-protocol.jsx, transpiles
    JSX → JS, and injects it as a module script. The import map above
    handles the bare specifiers (react, lucide-react, etc).
  -->
  <script
    type="text/babel"
    data-type="module"
    data-presets="react"
    src="./life-os-protocol.jsx"
  ></script>

  <!-- Boot watchdog — surfaces any load errors after 8s -->
  <script>
    setTimeout(function () {
      var root = document.getElementById('root');
      if (root && !root.firstChild) {
        document.body.innerHTML =
          '<div class="__boot_error">' +
            '<h1>Boot timeout</h1>' +
            '<pre>App didn\'t mount within 8 seconds. Common causes:\n' +
            '  • CDN blocked or unreachable (check network / VPN)\n' +
            '  • JSX file path is wrong (must be ./life-os-protocol.jsx)\n' +
            '  • Syntax error in JSX — check browser console (F12)</pre>' +
            '<a href="javascript:location.reload()">↻ Reload</a>' +
          '</div>';
      }
    }, 8000);

    window.addEventListener('error', function (e) {
      console.error('[life-os] boot error:', e.error || e.message);
    });
  </script>
</body>
</html>
